# .github/workflows/release-please.yml
name: Release Scripts

description: |
  This workflow creates a new release on GitHub

  The workflow uses the `googleapis/release-please-action` to handle the
  release creation process and then calls the release.yml workflow in the
  jcouball/homebrew-tap repository to update the Homebrew formula.

permissions:
  contents: write       # For release-please (create PR, release, tag)
  pull-requests: write  # For release-please (create PR)
  actions: write        # For gh workflow run (to pudate homebrew package)

on:
  push:
    branches:
      - main

  workflow_dispatch:
    inputs:
      tag_name:
        description: "Re-run homebrew-tap update for this tag (e.g. v1.2.3). Leave empty on normal push-triggered runs."
        required: false
        default: ""

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest

    steps:
      - name: Secure runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          disable-sudo: true
          egress-policy: block
          allowed-endpoints: >
            api.github.com:443
            github.com:443
            storage.googleapis.com:443

      - name: Checkout repository
        uses: actions/checkout@v6
        # Fetch all history for all tags and branches
        with:
          fetch-depth: 0

      - name: Create release
        uses: googleapis/release-please-action@v5
        id: release
        with:
          token: ${{ secrets.AUTO_RELEASE_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      - name: Resolve tag name
        id: resolve_tag
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && -n "${{ github.event.inputs.tag_name }}" ]]; then
            tag="${{ github.event.inputs.tag_name }}"
            if [[ ! "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "Error: tag_name must be a v-prefixed semver tag (e.g. v1.2.3), got: '${tag}'" >&2
              exit 1
            fi
            echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ steps.release.outputs.tag_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Update homebrew-tap
        if: ${{ steps.release.outputs.release_created == 'true' || (github.event_name == 'workflow_dispatch' && github.event.inputs.tag_name != '') }}
        env:
          GH_TOKEN: ${{ secrets.AUTO_RELEASE_TOKEN }}
          RAW_TAG_NAME: ${{ steps.resolve_tag.outputs.tag }}
          SOURCE_REPO_PATH: ${{ github.repository }}
          FORMULA_NAME: "scripts"

        run: |
          set -e
          version=${RAW_TAG_NAME#v} # Removes 'v' prefix
          echo "Running 'release.yml' in jcouball/homebrew-tap with version: ${version}"
          gh workflow run release.yml \
            -f formula_name="${FORMULA_NAME}" \
            -f version="${version}" \
            -f source_repository_path="${SOURCE_REPO_PATH}" \
            -R jcouball/homebrew-tap
